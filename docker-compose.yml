services:
  triton:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TRITON_IMAGE_TAG: ${TRITON_IMAGE_TAG}
    network_mode: host
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ./docker-entrypoint.sh:/entrypoint.sh
      - ${MODEL_REPO_PATH}:/models
      - ${HF_CACHE_PATH}:/root/.cache/huggingface
      - type: bind
        source: ${PDF_INPUT_PATH}
        target: /data/pdfs
        bind:
          create_host_path: true
    environment:
      - TRITON_HTTP_PORT=${TRITON_HTTP_PORT}
      - TRITON_GRPC_PORT=${TRITON_GRPC_PORT}
      - TRITON_METRICS_PORT=${TRITON_METRICS_PORT}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - VLLM_LOGGING_LEVEL=DEBUG
      - REDIS_URL=${REDIS_URL}
      - CLUSTER_ID=${CLUSTER_ID}
      # Uncomment after the model is fully cached:
      # - HF_HUB_OFFLINE=1
      # - TRANSFORMERS_OFFLINE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TRITON_HTTP_PORT}/v2/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  redis:
    image: redis:${REDIS_IMAGE_TAG}
    profiles: ["local-redis"]
    network_mode: host
    command: redis-server --port ${REDIS_PORT}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - TRITON_URL=http://localhost:${TRITON_HTTP_PORT}
      - API_PORT=${API_PORT}
      - REDIS_URL=${REDIS_URL}
      - CLUSTER_ID=${CLUSTER_ID}
    depends_on:
      triton:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    profiles: ["local-redis"]
    network_mode: host
    restart: unless-stopped
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:${PROMETHEUS_IMAGE_TAG}
    networks:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
      - "--web.enable-lifecycle"
    depends_on:
      triton:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:${GRAFANA_IMAGE_TAG}
    networks:
      - monitoring
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring:
    driver: bridge
